<tr id="breaking-{{ item.pk }}">
  <td class="text-dim text-sm" style="width:60px;">{{ item.order }}</td>
  <td style="max-width:340px;">
    <span class="truncate" style="display:block;" title="{{ item.text }}">{{ item.text }}</span>
  </td>
  <td class="text-sm text-muted">
    {% if item.url %}
      <a href="{{ item.url }}" target="_blank" class="text-yellow" style="max-width:160px;display:block;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;">
        {{ item.url|truncatechars:35 }}
      </a>
    {% else %}—{% endif %}
  </td>
  <td>
    {% if item.is_active %}
      <span class="badge badge-active">Active</span>
    {% else %}
      <span class="badge badge-inactive">Inactive</span>
    {% endif %}
  </td>
  <td class="text-dim text-sm">{{ item.created_at|date:"d/m/Y H:i" }}</td>
  <td>
    <div style="display:flex;gap:6px;align-items:center;">
      <!-- Toggle -->
      <form hx-post="{% url 'dashboard:breaking_news_toggle' item.pk %}"
            hx-target="#breaking-{{ item.pk }}"
            hx-swap="outerHTML">
        {% csrf_token %}
        <button type="submit" class="btn btn-icon btn-sm {% if item.is_active %}btn-success{% else %}btn-ghost{% endif %}"
                title="{% if item.is_active %}Désactiver{% else %}Activer{% endif %}">
          <i class="bi bi-{% if item.is_active %}toggle-on{% else %}toggle-off{% endif %}"></i>
        </button>
      </form>
      <!-- Delete -->
      <form hx-post="{% url 'dashboard:breaking_news_delete' item.pk %}"
            hx-target="#breaking-{{ item.pk }}"
            hx-swap="outerHTML swap:0.2s"
            hx-confirm="Supprimer cette breaking news ?">
        {% csrf_token %}
        <button type="submit" class="btn btn-icon btn-sm btn-danger" title="Supprimer">
          <i class="bi bi-trash3"></i>
        </button>
      </form>
    </div>
  </td>
</tr>
