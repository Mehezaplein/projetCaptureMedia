<div class="table-wrapper">
  {% if tags %}
    <table>
      <thead>
        <tr>
          <th>Nom</th>
          <th>Slug</th>
          <th>Nombre d'articles</th>
          <th style="width:100px;">Actions</th>
        </tr>
      </thead>
      <tbody>
        {% for tag in tags %}
        <tr id="tag-{{ tag.id }}">
          <td class="font-bold">{{ tag.name }}</td>
          <td class="text-sm text-muted">{{ tag.slug }}</td>
          <td class="text-sm">{{ tag.articles.count }}</td>
          <td>
            <button hx-delete="{% url 'dashboard:tag_delete' tag.id %}" hx-confirm="Êtes-vous sûr de vouloir supprimer ce tag ?" hx-target="#tag-{{ tag.id }}" hx-swap="outerHTML swap:1s" class="btn btn-danger btn-sm btn-icon" title="Supprimer">
              <i class="bi bi-trash"></i>
            </button>
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  {% else %}
    <div class="empty-state">
      <i class="bi bi-tags"></i>
      <h3>Aucun tag</h3>
      <p>Créez votre premier tag pour organiser vos articles.</p>
    </div>
  {% endif %}
</div>
