{% extends 'dashboard/base.html' %}

{% block title %}Tags{% endblock %}
{% block breadcrumb %}Tags{% endblock %}

{% block content %}
<div class="page-header">
  <div class="page-header-left">
    <h1 class="page-title">Tags</h1>
    <p class="page-subtitle">Gérer les tags des articles</p>
  </div>
</div>

<div class="card">
  <div class="card-header">
    <div class="flex gap-8" style="flex: 1; align-items: center;">
      <div class="search-bar" style="flex: 1;" hx-post="{% url 'dashboard:tags_list' %}" hx-trigger="keyup delay:500ms" hx-target="#tags-table" hx-swap="innerHTML">
        <i class="bi bi-search"></i>
        <input type="text" name="search" placeholder="Chercher un tag..." />
      </div>
      <a href="{% url 'dashboard:tag_add' %}" class="btn btn-primary btn-sm">
        <i class="bi bi-plus-lg"></i>
        Ajouter
      </a>
    </div>
  </div>

  <div id="tags-table">
    {% include 'dashboard/tags/_table.html' %}
  </div>
</div>

<script>
  document.addEventListener('htmx:config:init:request', function(e) {
    e.detail.headers['X-CSRFToken'] = document.querySelector('[name=csrfmiddlewaretoken]')?.value || '';
  });
</script>
{% endblock %}
