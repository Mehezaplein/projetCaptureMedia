{% extends 'dashboard/base.html' %}

{% block title %}Utilisateurs{% endblock %}
{% block breadcrumb %}Gestion des utilisateurs{% endblock %}

{% block content %}
<div class="page-header">
  <div class="page-header-left">
    <h1 class="page-title">Utilisateurs</h1>
    <p class="page-subtitle">Gérer les comptes et permissions</p>
  </div>
  <a href="{% url 'dashboard:user_add' %}" class="btn btn-primary">
    <i class="bi bi-plus-lg"></i>
    Ajouter un utilisateur
  </a>
</div>

<div class="card">
  <div class="card-header">
    <div class="search-bar" hx-post="{% url 'dashboard:users_list' %}" hx-trigger="keyup delay:500ms" hx-target="#users-table" hx-swap="innerHTML">
      <i class="bi bi-search"></i>
      <input type="text" name="search" placeholder="Chercher un utilisateur..." />
    </div>
  </div>

  <div id="users-table">
    {% include 'dashboard/users/_table.html' %}
  </div>
</div>

<script>
  document.addEventListener('htmx:config:init:request', function(e) {
    e.detail.headers['X-CSRFToken'] = document.querySelector('[name=csrfmiddlewaretoken]')?.value || '';
  });
</script>
{% endblock %}
