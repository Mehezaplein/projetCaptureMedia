{% load static %}
<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connexion — Capture Media Dashboard</title>
  <link rel="icon" href="{% static 'assets/images/favicon.png' %}" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <style>
    :root {
      --cm-yellow: #F5C518;
      --cm-yellow-hover: #e0b314;
      --cm-yellow-soft: rgba(245,197,24,0.12);
    }

    [data-theme="dark"] {
      --bg: #0d0d0d;
      --surface: #1a1a1a;
      --border: #2d2d2d;
      --text: #f0f0f0;
      --text2: #888;
      --input-bg: #1f1f1f;
    }
    [data-theme="light"] {
      --bg: #f4f5f7;
      --surface: #ffffff;
      --border: #e2e5e9;
      --text: #111;
      --text2: #666;
      --input-bg: #f8f9fa;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: -50%;
      left: -20%;
      width: 700px;
      height: 700px;
      background: radial-gradient(circle, rgba(245,197,24,0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    body::after {
      content: '';
      position: fixed;
      bottom: -30%;
      right: -10%;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(245,197,24,0.05) 0%, transparent 70%);
      pointer-events: none;
    }

    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 44px 40px;
      width: 100%;
      max-width: 420px;
      position: relative;
      z-index: 1;
    }

    .login-logo {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 36px;
      text-align: center;
    }

    .login-logo img {
      width: 64px;
      height: 64px;
      border-radius: 14px;
      object-fit: contain;
      margin-bottom: 14px;
      box-shadow: 0 8px 32px rgba(245,197,24,0.3);
    }

    .login-logo h1 {
      font-family: 'Sora', sans-serif;
      font-size: 22px;
      font-weight: 800;
      color: var(--cm-yellow);
      letter-spacing: -0.5px;
    }

    .login-logo p {
      font-size: 13px;
      color: var(--text2);
      margin-top: 5px;
    }

    .form-group { margin-bottom: 18px; }

    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text2);
      margin-bottom: 8px;
    }

    .input-wrapper {
      position: relative;
    }

    .input-wrapper i {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text2);
      font-size: 16px;
      pointer-events: none;
    }

    .form-control {
      width: 100%;
      padding: 12px 14px 12px 42px;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .form-control:focus {
      border-color: var(--cm-yellow);
      box-shadow: 0 0 0 3px rgba(245,197,24,0.12);
    }

    .btn-login {
      width: 100%;
      padding: 13px;
      background: var(--cm-yellow);
      color: #111;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-login:hover {
      background: var(--cm-yellow-hover);
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(245,197,24,0.3);
    }

    .alert-error {
      background: rgba(229,62,62,0.1);
      border: 1px solid rgba(229,62,62,0.25);
      color: #e53e3e;
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 13px;
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .login-footer {
      margin-top: 28px;
      text-align: center;
      font-size: 12px;
      color: var(--text2);
    }

    .login-footer a { color: var(--cm-yellow); }

    .theme-toggle {
      position: fixed;
      top: 20px;
      right: 20px;
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text2);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 18px;
      z-index: 10;
    }

    .divider { height: 1px; background: var(--border); margin: 24px 0; }
  </style>
</head>
<body>

  <button class="theme-toggle" onclick="toggleTheme()" title="Changer le thème">
    <i class="bi bi-moon-fill" id="themeIcon"></i>
  </button>

  <div class="login-card">
    <div class="login-logo">
      <img src="{% static 'assets/images/logo/logo.jpg' %}" alt="Capture Media" />
      <h1>Capture Media</h1>
      <p>Accès à l'espace d'administration</p>
    </div>

    {% if messages %}
      {% for msg in messages %}
      <div class="alert-error">
        <i class="bi bi-exclamation-circle-fill"></i>
        {{ msg }}
      </div>
      {% endfor %}
    {% endif %}

    <form method="POST">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label">Identifiant</label>
        <div class="input-wrapper">
          <i class="bi bi-person"></i>
          <input type="text" name="username" class="form-control" placeholder="Votre identifiant" required autofocus />
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Mot de passe</label>
        <div class="input-wrapper">
          <i class="bi bi-lock"></i>
          <input type="password" name="password" class="form-control" placeholder="••••••••" required />
        </div>
      </div>

      <button type="submit" class="btn-login">
        <i class="bi bi-shield-check"></i>
        Se connecter
      </button>
    </form>

    <div class="divider"></div>

    <div class="login-footer">
      <a href="/">← Retour au site</a>
      &nbsp;·&nbsp;
      Réservé aux <strong>administrateurs</strong>
    </div>
  </div>

  <script>
    const html = document.documentElement;
    const saved = localStorage.getItem('cm-theme') || 'dark';
    html.setAttribute('data-theme', saved);
    updateIcon(saved);

    function toggleTheme() {
      const cur = html.getAttribute('data-theme');
      const next = cur === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', next);
      localStorage.setItem('cm-theme', next);
      updateIcon(next);
    }

    function updateIcon(t) {
      document.getElementById('themeIcon').className = t === 'dark' ? 'bi bi-sun-fill' : 'bi bi-moon-fill';
    }
  </script>
</body>
</html>
