{% if global_active_poll %}
<div class="cm-poll-widget">
  <h5>Sondage du jour</h5>
  <p class="cm-poll-question">{{ global_active_poll.question }}</p>
  <form action="{% url 'poll_vote' global_active_poll.id %}" method="post">
    {% csrf_token %}
    {% for choice in global_active_poll.choices.all %}
    <label class="cm-poll-choice">
      <input type="radio" name="choice" value="{{ choice.id }}" required>
      {{ choice.text }}
    </label>
    {% endfor %}
    <button type="submit" class="cm-poll-submit">Voter</button>
    <p style="margin-top:10px;font-family:'Space Mono',monospace;font-size:.6rem;color:#7A7465;text-align:center;">
      {{ global_active_poll.total_votes }} votes
    </p>
  </form>
</div>
{% endif %}
